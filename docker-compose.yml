services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: weatherapp-api-local
    container_name: weatherapp-api-local
    ports:
      - "8000:8000"
    environment:
      - NWS_USER_AGENT=${NWS_USER_AGENT:-weatherapp-local (replace-with-contact@example.com)}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
