namespace:
  create: true
  name: weather

api:
  replicas: 1
  image:
    repository: ghcr.io/dylanwhitetech/weatherapp-api
    tag: replace-with-release-sha
    digest: ""
    pullPolicy: IfNotPresent
  service:
    port: 8000
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  env:
    WEATHER_LOCATION_NAME: "Walla Walla, WA"
    WEATHER_LATITUDE: "46.0646"
    WEATHER_LONGITUDE: "-118.3430"
    WEATHER_TIMEZONE: "America/Los_Angeles"
    NWS_USER_AGENT: "weatherapp/0.1 (replace-with-contact@example.com)"
    CACHE_TTL_SECONDS: "600"
    STALE_DATA_MAX_SECONDS: "3600"
    LOG_LEVEL: "INFO"

web:
  replicas: 1
  image:
    repository: ghcr.io/dylanwhitetech/weatherapp-web
    tag: replace-with-release-sha
    digest: ""
    pullPolicy: IfNotPresent
  service:
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

ingress:
  enabled: true
  className: nginx
  host: weather.home.arpa
  annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s

imagePullSecrets: []
